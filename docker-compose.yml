name: scribai

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scribai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scribai}
      POSTGRES_DB: ${POSTGRES_DB:-scribai}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scribai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-scribai}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-scribaipass}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Database=${POSTGRES_DB:-scribai};Username=${POSTGRES_USER:-scribai};Password=${POSTGRES_PASSWORD:-scribai}
      Ollama__BaseUrl: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      Ollama__DefaultModel: ${OLLAMA_DEFAULT_MODEL:-qwen2.5:7b-instruct}
      Ollama__VisionModel: ${OLLAMA_VISION_MODEL:-llama3.2-vision}
      Redis__ConnectionString: redis:6379
      Storage__Endpoint: minio:9000
      Storage__AccessKey: ${MINIO_ACCESS_KEY:-scribai}
      Storage__SecretKey: ${MINIO_SECRET_KEY:-scribaipass}
      Storage__Bucket: ${MINIO_BUCKET:-scribai-originals}
      Processing__TesseractLangs: ${TESSERACT_LANGS:-spa+eng}
      Processing__SyncMaxBytes: ${SYNC_MAX_BYTES:-2097152}
      Processing__MaxUploadBytes: ${MAX_UPLOAD_BYTES:-52428800}
      SCRIBAI_SECRETS_KEY: ${SCRIBAI_SECRETS_KEY}
    ports:
      - "${API_PORT:-8081}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_URL: ${WEB_API_URL:-http://localhost:8081}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  pg-data:
  minio-data:
